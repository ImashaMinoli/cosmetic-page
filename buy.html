<!DOCTYPE html>

<html>
<head>
    <title>Billing Card</title>
    <link rel="stylesheet" href="stylesheet.css">

</head>    
<body>
    <div class="container">
  
    <form>
        <h2>Billing & Shipping</h2>
        <div>

            <label>
            <input type="radio" name ="title">
            Mr.</label>

            <label>
            <input type="radio"name ="title">
            Mrs.</label>

            <label>
            <input type="radio"name ="title">
            Miss.</label>

        </div>
        

        <div>
           <label for="fname">First name :</label>
           <input type="text" id="fname" name="fname" placeholder="Enter your first name">
        </div>
        

        <div>
           <label for="lname">Last name :</label>
           <input type="text" id="lname" name="lname" placeholder="Enter your last name">
        </div>
        

        <div>
            <label for="bdate">Birthdate :</label>
            <input type="date" id="bdate" name="bdate">
        </div>
        

        <div>
            <label for="address">Street address :</label>
            <input type="text" id="address" name="address" placeholder="House number and street name">
        </div>
        

        <div>
            <label for="city">City :</label>
            <input type="text" id="city" name="city" placeholder="Enter city">
         
        </div>
        

        <div>
            <label for="country">Country:</label>
            <input type="text" id="country" name="country" placeholder="Enter country">
         
        </div>
        

        <div>
            <label for="phone">Mobile number :</label>
            <input type="tel" id="phone" name="phone" placeholder ="(123)-456-7890">
         
        </div>
        

        <div>
            <label for="email">Email :</label>
            <input type="email" id="email" name="email" placeholder="xxxxxx@gmail.com">
         
        </div>
        

        <div>
            <label for="quantity">Quantity :</label>
            <input type="number" id="quantity" name="quantity" min="0" max="99" value="1" >
         
        </div>
        <button type="submit">Place Order</button>
    </form>
    </div>
</body>
</html>
