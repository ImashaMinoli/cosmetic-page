<!DOCTYPE html>

<html>
<body>
  <h3>Billing & Shipping</h3>
    <form>

        <div>

            <label>Mr.</label>
            <input type="radio">

            <label>Mrs.</label>
            <input type="radio">

            <label>Miss.</label>
            <input type="radio">


        </div>
        <br>

        <div>
           <label for="fname">First name :</label>
           <input type="text" id="fname" name="fname" placeholder="xxxxxxxxxx">
        </div>
        <br>

        <div>
           <label for="lname">Last name :</label>
           <input type="text" id="lname" name="lname" placeholder="xxxxxxxxxx">
        </div>
        <br>

        <div>
            <label for="bdate">Birthdate :</label>
            <input type="date" id="bdate" name="bdate">
        </div>
        <br>

        <div>
            <label for="address">Street address :</label>
            <input type="text" id="address" name="address" placeholder="House number and street name">
        </div>
        <br>

        <div>
            <label for="city">City :</label>
            <input type="text" id="city" name="city" placeholder="Enter city">
         
        </div>
        <br>

        <div>
            <label for="country">Country:</label>
            <input type="text" id="country" name="country" placeholder="Enter country">
         
        </div>
        <br>

        <div>
            <label for="phone">Mobile number :</label>
            <input type="tel" id="phone" name="phone" placeholder ="(123)-456-7890">
         
        </div>
        <br>

        <div>
            <label for="email">Email :</label>
            <input type="email" id="email" name="email" placeholder="xxxxxx@gmail.com">
         
        </div>
        <br>

        <div>
            <label for="quantity">Quantity :</label>
            <input type="number" id="quantity" name="quantity" min="0" max="99" value="1" >
         
        </div>
    </form>
</body>
</html>
